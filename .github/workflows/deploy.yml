name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Lint -> test -> prepare-assets -> build -> e2e -> lighthouse ->
  # upload-pages-artifact. Pipeline body lives in the shared reusable
  # workflow so PR (ci.yml) and main-deploy stay in lockstep.
  build:
    name: Lint, Test & Build
    uses: ./.github/workflows/_lint-test-build.yml
    permissions:
      contents: read
    with:
      audit-level: high
      build-sha: ${{ github.sha }}
      report-name: playwright-report-deploy
      lighthouse: true
      upload-pages: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    # Hard ceiling above the polling budget (10 attempts x 15s sleep + curl
    # cost ~= 3 min). Five gives slack for a slow CDN warm-up.
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify live site
        run: |
          set -euo pipefail
          BUILD_SHA="${{ github.sha }}"
          for i in {1..10}; do
            body=$(curl -sf https://rohitvipin.github.io/) || body=""
            if echo "$body" | grep -q "Rohit Vipin Mathews" && echo "$body" | grep -q "content=\"${BUILD_SHA}\""; then
              echo "Smoke test passed (build SHA confirmed)"
              exit 0
            fi
            echo "Attempt $i: build SHA not yet live, retrying in 15s..."
            sleep 15
          done
          echo "Smoke test failed after 10 attempts" && exit 1

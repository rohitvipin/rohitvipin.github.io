name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.19.1"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Prettier
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Generate resume PDF
        timeout-minutes: 5
        run: npm run generate-resume

      - name: Verify resume PDF
        run: test -s public/Rohit_Vipin_Mathews_Resume.pdf

      - name: Fetch avatar
        run: npm run fetch-avatar

      - name: Verify avatar file
        run: test -s public/avatar.jpg

      - name: Generate sitemap
        run: npx tsx utils/generate-sitemap.ts
        env:
          NEXT_PUBLIC_SITE_URL: "https://rohitvipin.github.io"

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: "https://rohitvipin.github.io"

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify live site
        run: |
          for i in {1..10}; do
            body=$(curl -sf https://rohitvipin.github.io/)
            echo "$body" | grep -q "Rohit Vipin Mathews" && exit 0
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Smoke test failed after 10 attempts" && exit 1

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Prettier
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Prepare static assets
        uses: ./.github/actions/prepare-assets

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: "https://rohitvipin.github.io"
          NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify live site
        run: |
          BUILD_SHA="${{ github.sha }}"
          for i in {1..10}; do
            body=$(curl -sf https://rohitvipin.github.io/)
            if echo "$body" | grep -q "Rohit Vipin Mathews" && echo "$body" | grep -q "content=\"${BUILD_SHA}\""; then
              echo "Smoke test passed (build SHA confirmed)"
              exit 0
            fi
            echo "Attempt $i: build SHA not yet live, retrying in 15s..."
            sleep 15
          done
          echo "Smoke test failed after 10 attempts" && exit 1

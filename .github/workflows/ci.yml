name: CI

on:
  pull_request:
    branches: [main]
  # push to main intentionally omitted -- deploy.yml runs the full
  # lint/test/build pipeline on every main push via the same reusable
  # workflow.

permissions:
  contents: read
  # dependency-review-action posts a summary comment on the PR when its
  # default `comment-summary-in-pr` flag is true; that requires write.
  pull-requests: write

# Cancel superseded runs when new commits land on the same PR branch.
# Free runner minutes during rapid push cycles.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR-only quality scans. Keeping these out of the reusable workflow
  # because actions/dependency-review-action only runs on pull_request /
  # merge_group events and would error if invoked from deploy.yml's
  # push trigger. Gitleaks needs fetch-depth: 0 which is wasted on
  # deploy.yml; isolate the cost here.
  quality-scans:
    name: Quality scans
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # gitleaks-action below scans full git history for secrets;
          # actions/checkout default fetch-depth=1 would limit the scan
          # to the PR head commit only.
          fetch-depth: 0

      # G29 (NFR_TEST_GAPS.md): GHAS dependency review blocks PRs that
      # introduce known-vulnerable dependencies. Free for public repos.
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

      # G25 (NFR_TEST_GAPS.md): gitleaks scans the PR diff and full
      # git history (requires fetch-depth: 0 above) for modern secret
      # formats (github_pat_, sk-ant-, sk-proj-, AIza, xox[bp]-, JWT,
      # PEM private keys) that the bespoke regex in tc-13-security.spec.ts
      # does not cover. Free tier covers public repos.
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-test-build:
    name: Lint, Test & Build
    uses: ./.github/workflows/_lint-test-build.yml
    permissions:
      contents: read
    with:
      audit-level: high
      report-name: playwright-report-ci

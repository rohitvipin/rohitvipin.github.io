name: CI

on:
  pull_request:
    branches: [main]
  # push to main intentionally omitted — deploy.yml runs the full lint/test/build pipeline on every main push

permissions:
  contents: read
  # dependency-review-action posts a summary comment on the PR when its
  # default `comment-summary-in-pr` flag is true; that requires write.
  pull-requests: write

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # gitleaks-action below scans full git history for secrets;
          # actions/checkout default fetch-depth=1 would limit the scan
          # to the PR head commit only.
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      # G29 (NFR_TEST_GAPS.md): GHAS dependency review blocks PRs that
      # introduce known-vulnerable dependencies. Free for public repos.
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

      # G25 (NFR_TEST_GAPS.md): gitleaks scans the PR diff and full
      # git history (requires fetch-depth: 0 above) for modern secret
      # formats (github_pat_, sk-ant-, sk-proj-, AIza, xox[bp]-, JWT,
      # PEM private keys) that the bespoke regex in tc-13-security.spec.ts
      # does not cover. Free tier covers public repos.
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      # G11 (NFR_TEST_GAPS.md): bumped from --audit-level=critical to high.
      # HIGH-severity advisories must not silently land on main.
      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Prettier
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: "https://rohitvipin.github.io"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@de65e23aa2b7e23d713bb51fbfcb6d502f8667d8 # v5.0.0
        with:
          name: playwright-report-ci
          path: playwright-report/
          retention-days: 7

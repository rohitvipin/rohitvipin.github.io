name: Bug report
description: Report a bug or unexpected behaviour
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the unexpected behaviour.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should happen instead?
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "e.g. 20.11.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows

  - type: input
    id: browser
    attributes:
      label: Browser (if applicable)
      placeholder: "e.g. Chrome 123"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, or anything else relevant.

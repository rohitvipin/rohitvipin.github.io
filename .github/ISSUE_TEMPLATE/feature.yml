name: Feature request
description: Propose a new feature or enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What problem does this solve?
      description: Describe the feature and why it is needed.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: technical
    attributes:
      label: Technical considerations
      description: Types/schemas, new data fields, component dependencies, performance impact.

  - type: input
    id: related
    attributes:
      label: Related issues
      placeholder: "Closes #123"

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    ignore:
      # eslint-config-next@16.x ships eslint-plugin-react@7.37.5 whose peer
      # range tops out at eslint@^9. ESLint 10 changed the rule context API
      # (context.getFilename() removed), so react/display-name throws
      # "contextOrFilename.getFilename is not a function" on load.
      #
      # Tracking (issues disabled on this repo):
      #   Added: 2026-04-29
      #   Review by: 2026-07-29 (quarterly)
      #   Unblock when: `npm view eslint-config-next peerDependencies.eslint`
      #     reports `^10` (currently `^9`); then delete this ignore block and
      #     let dependabot raise the eslint major bump.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
